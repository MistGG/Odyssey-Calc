<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Odyssey Calc</title>
  <script src="/hash-router-path-redirect.js"></script>
</head>
<body>
  <p>Redirecting…</p>
  <script>
    // GitHub Pages 404: if redirect did not run (unknown path), go home.
    setTimeout(function () {
      if (!location.hash || location.hash === '#') {
        location.replace(location.origin + '/')
      }
    }, 120)
  </script>
</body>
</html>
