<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Unofficial fan-made Digimon Odyssey tools: DPS meter, tier list, guidebook, and calculators. Not affiliated with or operated by the official Digital Odyssey game."
    />
    <meta name="robots" content="index, follow" />
    <title>Odyssey Calc — unofficial fan tools for Digimon Odyssey</title>
    <link rel="canonical" href="https://odyssey-calc.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script src="/hash-router-path-redirect.js"></script>
    <div id="root"></div>
    <script>
      ;(function () {
        function showStaleAssetMessage() {
          var root = document.getElementById('root')
          if (root && root.childNodes.length) return
          document.body.innerHTML =
            '<div style="font-family:system-ui,sans-serif;max-width:28rem;margin:4rem auto;padding:1.5rem;text-align:center;color:#cbd5e1;background:#0a0f1a;min-height:100vh;box-sizing:border-box">' +
            '<h1 style="color:#f1f5f9;font-size:1.25rem;margin:0 0 0.75rem">Odyssey Calc</h1>' +
            '<p style="margin:0 0 1rem;line-height:1.5">The site was updated and your browser is loading an old file. Reload once to fix the blank page.</p>' +
            '<button type="button" style="padding:0.5rem 1rem;cursor:pointer;border-radius:8px;border:1px solid #38bdf8;background:#0f172a;color:#e2e8f0" onclick="location.reload()">Reload</button></div>'
        }
        function recoverStaleAsset() {
          var key = 'odyssey-calc-stale-asset-reload'
          try {
            if (!sessionStorage.getItem(key)) {
              sessionStorage.setItem(key, '1')
              location.reload()
              return
            }
          } catch (_) {}
          showStaleAssetMessage()
        }
        window.addEventListener(
          'error',
          function (e) {
            var t = e.target
            if (!t || !t.src) return
            var src = String(t.src)
            var stale =
              (t.tagName === 'SCRIPT' && /\/assets\/index-[^/]+\.js/.test(src)) ||
              (t.tagName === 'LINK' && /\/assets\/index-[^/]+\.css/.test(src))
            if (stale) recoverStaleAsset()
          },
          true,
        )
        window.addEventListener('vite:preloadError', function () {
          location.reload()
        })
      })()
    </script>
    <noscript>
      <footer class="static-fan-footer">
        <p>
          <strong>Unofficial fan site.</strong> Odyssey Calc is not the official Digital Odyssey
          website. JavaScript is required for the interactive tools.
          <a href="https://thedigitalodyssey.com/" rel="noopener noreferrer">Official game site</a>
        </p>
      </footer>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
