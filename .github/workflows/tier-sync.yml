name: Tier Sync (Supabase)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      force_recompute:
        description: Run tier worker even when sync found no API changes
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync_call.outputs.changed }}
    steps:
      - name: Trigger Supabase tier sync function
        id: sync_call
        env:
          TIER_SYNC_FUNCTION_URL: ${{ secrets.TIER_SYNC_FUNCTION_URL }}
          TIER_SYNC_CRON_KEY: ${{ secrets.TIER_SYNC_CRON_KEY }}
        run: |
          if [ -z "$TIER_SYNC_FUNCTION_URL" ]; then
            echo "Missing secret: TIER_SYNC_FUNCTION_URL"
            exit 1
          fi
          if [ -z "$TIER_SYNC_CRON_KEY" ]; then
            echo "Missing secret: TIER_SYNC_CRON_KEY"
            exit 1
          fi

          response_file="$(mktemp)"
          curl --fail --show-error --silent \
            -X POST "$TIER_SYNC_FUNCTION_URL" \
            -H "Content-Type: application/json" \
            -H "x-sync-key: $TIER_SYNC_CRON_KEY" \
            -d '{"source":"github-actions-cron"}' > "$response_file"

          node -e "const fs=require('fs');const p=process.argv[1];const raw=fs.readFileSync(p,'utf8');let j={};try{j=JSON.parse(raw)}catch(e){console.error(raw);throw e}const changed=String(Boolean(j.changed));fs.appendFileSync(process.env.GITHUB_OUTPUT, 'changed=' + changed + '\n');console.log('sync changed:', changed);console.log('sync response:', JSON.stringify(j));" "$response_file"

  recompute:
    runs-on: ubuntu-latest
    needs: sync
    if: >-
      needs.sync.outputs.changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.force_recompute == true)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker dependencies
        run: npm install --no-save playwright @supabase/supabase-js ws

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Rebuild and publish live tier snapshot
        env:
          TIER_WORKER_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_recompute && '1' || '' }}
          TIER_WORKER_EMAIL: ${{ secrets.TIER_WORKER_EMAIL }}
          TIER_WORKER_PASSWORD: ${{ secrets.TIER_WORKER_PASSWORD }}
          TIER_WORKER_SITE_ORIGIN: ${{ secrets.TIER_WORKER_SITE_ORIGIN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$TIER_WORKER_EMAIL" ]; then
            echo "Missing secret: TIER_WORKER_EMAIL"
            exit 1
          fi
          if [ -z "$TIER_WORKER_PASSWORD" ]; then
            echo "Missing secret: TIER_WORKER_PASSWORD"
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "Missing secret: VITE_SUPABASE_URL"
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Missing secret: VITE_SUPABASE_ANON_KEY"
            exit 1
          fi

          node scripts/tier-worker-refresh.mjs

