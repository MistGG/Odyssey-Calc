name: Sync meter profile shares

# Copies Discord share HTML/OG from Supabase into public/ and commits so GitHub Pages can serve them.
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-meter-shares
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync share pages from Supabase
        run: npm run sync:meter-shares
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Commit and push share pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/share/meter-player/
          if git diff --staged --quiet; then
            echo "No meter share page changes to commit."
            exit 0
          fi
          git commit -m "chore: sync meter Discord share pages [skip ci]"
          git push
