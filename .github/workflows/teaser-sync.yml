name: Forum teaser sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape forum teaser and sync UK-safe copy
        run: node scripts/sync-forum-teaser.mjs

      - name: Commit teaser manifest and bundled image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/teaser-manifest.json public/teasers/
          if git diff --staged --quiet; then
            echo "No teaser changes to commit."
            exit 0
          fi
          git commit -m "chore(teaser): sync forum teaser for UK hosting"
          git push
